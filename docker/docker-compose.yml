version: "3.8"

services:
  evolution-api:
    image: atendai/evolution-api:v2.2.3
    container_name: evolution-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: cariocas-pro-evolution-key-2026

      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: sqlite
      DATABASE_CONNECTION_URI: /evolution/data/database.sqlite
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"

      WEBHOOK_GLOBAL_URL: http://host.docker.internal:3000/api/whatsapp/webhook
      WEBHOOK_GLOBAL_EVENTS: messages.upsert
      WEBHOOK_EVENTS: messages.upsert

      DEL_INSTANCE: "false"
      QRCODE_LIMIT: 60

      LOG_LEVEL: info
      LOG_SAVE: "true"

      REDIS_ENABLED: "false"
      CACHE_REDIS_DISABLED: "true"

    volumes:
      - ./evolution-data:/evolution/data
      - ./evolution-instances:/evolution/instances

    extra_hosts:
      - "host.docker.internal:host-gateway"
