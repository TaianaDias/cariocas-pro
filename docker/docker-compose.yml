version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: evolution-postgres
    restart: always
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution"]
      interval: 10s
      timeout: 5s
      retries: 5

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: evolution-api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: cariocas-pro-evolution-key-2026

      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution@postgres:5432/evolution?schema=public
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"

      WEBHOOK_GLOBAL_URL: http://host.docker.internal:3000/api/whatsapp/webhook
      WEBHOOK_GLOBAL_EVENTS: messages.upsert
      WEBHOOK_EVENTS: messages.upsert

      DEL_INSTANCE: "false"
      QRCODE_LIMIT: 60

      LOG_LEVEL: info
      LOG_SAVE: "true"

      REDIS_ENABLED: "false"
      CACHE_REDIS_DISABLED: "true"

    volumes:
      - ./evolution-instances:/evolution/instances

    extra_hosts:
      - "host.docker.internal:host-gateway"
